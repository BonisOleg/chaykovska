databases:
  - name: chaykovska-db
    databaseName: chaykovska
    user: chaykovska
    plan: free # Змініть на starter для production

services:
  - type: web
    name: chaykovska-web
    env: python
    plan: free # Змініть на starter/standard для production
    buildCommand: "./build.sh"
    startCommand: "gunicorn project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        fromDatabase:
          name: chaykovska-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: project.settings.production
      # Cloudinary змінні (вводяться вручну у Render Dashboard)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false